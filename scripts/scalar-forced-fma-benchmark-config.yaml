# Temporary benchmark config for the forced-FMA scalar variants.
# Uses the exact same arguments as the existing scalar stack_from runs
# (see benchmark_scalar.yaml and the baseline result
#  scripts/timing_results/timing_stack_from_opt7_20260525_163323_bench4.csv).
seed: 1234

benchmarks:
  - target: stack_from_opt5_fma
    stack: true
    real: false
    profile: false
    cases: &scalar_cases
      - [256, 256, 1]
      - [384, 384, 1]
      - [512, 512, 1]
      - [768, 768, 1]
      - [1024, 1024, 1]
      - [1536, 1536, 1]
      - [2048, 2048, 1]
      - [3072, 3072, 1]
      - [4096, 4096, 1]

  - target: stack_from_opt7_fma
    stack: true
    real: false
    profile: false
    cases: *scalar_cases

  - target: stack_from_opt7_6
    stack: true
    real: false
    profile: false
    cases: *scalar_cases
